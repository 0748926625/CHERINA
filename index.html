/* ─── GRILLE DE SECOURS (portée depuis cherina-expo) ─────── */
function makeGrid(n, sW, sH, pad, top, bot, W, H) {
  const areaW = W - pad * 2;
  const areaH = Math.max(sH + 10, H - top - bot);
  const maxCols = Math.max(1, Math.floor((areaW + 10) / (sW + 10)));
  const cols    = Math.min(n, maxCols);
  const rows    = Math.ceil(n / cols);
  const cellW   = areaW / cols;
  const cellH   = areaH / rows;
  const grid    = [];
  for (let r = 0; r < rows && grid.length < n; r++) {
    const inRow    = (r === rows - 1 && n % cols !== 0) ? n % cols : cols;
    const rowShift = (areaW - inRow * cellW) / 2;
    for (let c = 0; c < inRow && grid.length < n; c++) {
      grid.push({
        x: clamp(pad + rowShift + c * cellW + (cellW - sW) / 2, pad, W - sW - pad),
        y: clamp(top + r * cellH + (cellH - sH) / 2,            top, Math.max(top, H - sH - bot))
      });
    }
  }
  return grid;
}

/* ─── POSITION SPREADER (portée depuis cherina-expo) ─────── */
/* Sur écrans < 500px (téléphones) : grille directe garantie.
   Sur grands écrans : aléatoire avec grille en secours.        */
function spreadPositions(n, itemW = 166, itemH = 256) {
  const W = gw(), H = gh();
  const scale = Math.min(1, W / 420);
  const sW    = Math.round(itemW * scale);
  const sH    = Math.round(itemH * scale);
  const pad   = 12, top = 90, bot = 110;

  if (W < 500) return makeGrid(n, sW, sH, pad, top, bot, W, H);

  const minGapX = sW + 14;
  const minGapY = sH + 12;
  const out = [];
  let tries = 0;
  while (out.length < n && tries < 600) {
    tries++;
    const p = { x: rand(pad, W - sW - pad), y: rand(top, Math.max(top + 1, H - sH - bot)) };
    if (out.every(q => Math.abs(q.x - p.x) > minGapX || Math.abs(q.y - p.y) > minGapY))
      out.push(p);
  }
  return out.length >= n ? out : makeGrid(n, sW, sH, pad, top, bot, W, H);
}

/* ─── SPREAD DÉFI — appelle spreadPositions avec tailles CSS réelles ── */
function challengeSpread(iW, iH) {
  return spreadPositions(3, iW, iH);
}

/* ─── VIEWPORT HELPERS ──────────────────────────────────── */
/* Utilise visualViewport pour avoir la vraie zone visible
   (barre d'adresse du navigateur mobile exclue) */
function gw() { return window.visualViewport ? window.visualViewport.width  : window.innerWidth; }
function gh() { return window.visualViewport ? window.visualViewport.height : window.innerHeight; }

/* ─── UTILITIES ─────────────────────────────────────────── */
function pick(arr)    { return arr[Math.floor(Math.random() * arr.length)]; }
function pickBravo()  { return pick(['Super !', 'Bravo !', 'Ouiiii !', 'Génial !']); }
function rand(a, b)   { return a + Math.random() * (b - a); }
function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function lighten(hex, amt = 60) {
  const c = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, ((c >> 16) & 0xff) + amt);
  const g = Math.min(255, ((c >> 8)  & 0xff) + amt);
  const b = Math.min(255, ( c        & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, amt = 40) {
  const c = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, ((c >> 16) & 0xff) - amt);
  const g = Math.max(0, ((c >> 8)  & 0xff) - amt);
  const b = Math.max(0, ( c        & 0xff) - amt);
  return `rgb(${r},${g},${b})`;
}

/* ─── FEEDBACK HAPTIQUE ─────────────────────────────────── */
function vibrateError() {
  try { navigator.vibrate(90); } catch(e) {}
}

function playWait() {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(740, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(520, ctx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
    setTimeout(() => ctx.close(), 600);
  } catch(e) {}
}

/* ─── JEU D'ASSOCIATION (MEMORY) ────────────────────────── */
const MATCH_COLORS = [
  { id:'rouge',  hex:'#FF3B30', label:'rouge'  },
  { id:'bleu',   hex:'#007AFF', label:'bleu'   },
  { id:'vert',   hex:'#30D158', label:'vert'   },
  { id:'jaune',  hex:'#FFD60A', label:'jaune'  },
  { id:'violet', hex:'#BF5AF2', label:'violet' },
  { id:'orange', hex:'#FF9F0A', label:'orange' },
];
const MATCH_SHAPE_IDS = ['cercle','carre','triangle','etoile','losange','rectangle'];

function shapePathFor(id, color) {
  const paths = {
    cercle:    `<circle cx="50" cy="50" r="42" fill="${color}"/>`,
    carre:     `<rect x="8" y="8" width="84" height="84" rx="8" fill="${color}"/>`,
    triangle:  `<polygon points="50,6 92,90 8,90" fill="${color}"/>`,
    etoile:    `<polygon points="50,5 61,36 96,36 68,57 79,92 50,70 21,92 32,57 4,36 39,36" fill="${color}"/>`,
    losange:   `<polygon points="50,5 95,50 50,95 5,50" fill="${color}"/>`,
    rectangle: `<rect x="6" y="20" width="88" height="60" rx="8" fill="${color}"/>`,
  };
  return `<svg width="68" height="68" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${paths[id]||''}</svg>`;
}

function genColorPairs() {
  const cols  = shuffle([...MATCH_COLORS]).slice(0, 3);
  const shape = pick(MATCH_SHAPE_IDS);
  const cards = [];
  cols.forEach(c => {
    for (let i = 0; i < 2; i++)
      cards.push({ key:c.id, spoken:c.label, html:shapePathFor(shape, c.hex) });
  });
  return shuffle(cards);
}

function genShapePairs() {
  const shapes = shuffle([...MATCH_SHAPE_IDS]).slice(0, 3);
  const color  = pick(MATCH_COLORS);
  const cards  = [];
  shapes.forEach(s => {
    for (let i = 0; i < 2; i++)
      cards.push({ key:s, spoken:s === 'carre' ? 'carré' : s, html:shapePathFor(s, color.hex) });
  });
  return shuffle(cards);
}

function genAnimalPairs() {
  const animals = shuffle([...ANIMALS]).slice(0, 3);
  const cards   = [];
  animals.forEach(a => {
    for (let i = 0; i < 2; i++)
      cards.push({ key:a.id, spoken:a.label,
        html:`<img src="ANIMAUX/${a.image}" style="width:72%;height:72%;object-fit:contain">` });
  });
  return shuffle(cards);
}

const matchG = { active:false, score:0, selected:null, cards:[], matched:0, pairs:0, speaking:false };

function startMatchGame() {
  fadeOutIntroAudio();
  matchG.active = true; matchG.score = 0;
  document.getElementById('match-score').textContent = '⭐ 0';
  document.getElementById('match-overlay').classList.add('active');
  nextMatchRound();
}

function stopMatchGame() {
  matchG.active = false;
  document.getElementById('match-overlay').classList.remove('active');
}

function nextMatchRound() {
  if (!matchG.active) return;
  matchG.selected = null; matchG.matched = 0; matchG.speaking = false;
  const mode = pick(['color','shape','animal']);
  let cards, instr;
  if (mode === 'color') {
    cards = genColorPairs(); instr = 'Associe les mêmes couleurs !';
  } else if (mode === 'shape') {
    cards = genShapePairs(); instr = 'Associe les mêmes formes !';
  } else {
    cards = genAnimalPairs(); instr = 'Trouve les deux pareils !';
  }
  matchG.cards = cards.map((c, i) => ({ ...c, idx:i, matched:false, el:null }));
  matchG.pairs = matchG.cards.length / 2;
  document.getElementById('match-instr').textContent = instr;
  matchG.speaking = true;
  speak(instr, 0.78, 1.2);
  setTimeout(() => { matchG.speaking = false; }, Math.max(1800, instr.length * 75));
  const grid = document.getElementById('match-grid');
  grid.innerHTML = '';
  matchG.cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'match-card';
    el.innerHTML = card.html;
    el.addEventListener('touchend', e => { e.preventDefault(); onMatchTap(i); }, { passive:false });
    el.addEventListener('click', () => onMatchTap(i));
    grid.appendChild(el);
    card.el = el;
  });
}

function onMatchTap(idx) {
  if (!matchG.active) return;
  if (matchG.speaking) { playWait(); return; }
  const card = matchG.cards[idx];
  if (!card || card.matched) return;
  if (matchG.selected === null) {
    matchG.selected = idx;
    card.el.classList.add('selected');
    speak(card.spoken, 0.78, 1.1);
    return;
  }
  if (matchG.selected === idx) {
    card.el.classList.remove('selected');
    matchG.selected = null;
    return;
  }
  const first  = matchG.cards[matchG.selected];
  const second = card;
  first.el.classList.remove('selected');
  matchG.selected = null;
  if (first.key === second.key) {
    first.matched  = true;
    second.matched = true;
    first.el.classList.add('matched-ok');
    second.el.classList.add('matched-ok');
    matchG.matched++;
    speak(pickBravo(), 0.75, 1.35);
    confettiRain();
    if (matchG.matched === matchG.pairs) {
      matchG.score++;
      document.getElementById('match-score').textContent = `⭐ ${matchG.score}`;
      speak('Bravo ! Tu as tout trouvé !', 0.75, 1.2);
      setTimeout(nextMatchRound, 1800);
    }
  } else {
    vibrateError();
    first.el.classList.add('wrong-flash');
    second.el.classList.add('wrong-flash');
    setTimeout(() => {
      first.el.classList.remove('wrong-flash');
      second.el.classList.remove('wrong-flash');
    }, 500);
    speak('Cherche encore !', 0.78, 1.2);
  }
}
